version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd frontend
        - npm ci
    build:
      commands:
        - export NUXT_PUBLIC_API_BASE_URL=https://api.merchflow.org/api/v1
        - export NITRO_PRESET=aws-amplify
        - npm run build
  artifacts:
    baseDirectory: frontend/.amplify-hosting
    files:
      - '**/*'
  cache:
    paths:
      - frontend/node_modules/**/*
