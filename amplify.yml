version: 1
applications:
  - appRoot: frontend
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            - export NUXT_PUBLIC_API_BASE_URL=https://api.merchflow.org/api/v1
            - export NITRO_PRESET=aws-amplify
            - npm run build
      artifacts:
        baseDirectory: .amplify-hosting
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
