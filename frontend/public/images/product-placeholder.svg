<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800" fill="none">
  <defs>
    <linearGradient id="p-bg" x1="0" y1="0" x2="800" y2="800" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="p-card" x1="160" y1="160" x2="640" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.08"/>
    </linearGradient>
  </defs>

  <rect width="800" height="800" fill="url(#p-bg)"/>

  <rect x="160" y="160" width="480" height="480" rx="36" fill="url(#p-card)" stroke="#FFFFFF" stroke-opacity="0.25"/>

  <!-- Package / product silhouette -->
  <rect x="290" y="330" width="220" height="180" rx="20" fill="#FFFFFF" fill-opacity="0.14" stroke="#FFFFFF" stroke-opacity="0.22" stroke-width="2"/>
  <path d="M330 330V300c0-38.7 31.3-70 70-70s70 31.3 70 70v30" stroke="#FFFFFF" stroke-opacity="0.22" stroke-width="2" stroke-linecap="round" fill="none"/>
  <rect x="360" y="390" width="80" height="10" rx="5" fill="#FFFFFF" fill-opacity="0.2"/>

  <text x="400" y="700" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="28" fill="#E2E8F0">
    Product
  </text>
</svg>
