services:

  api:
    build: api
    ports:
      - 21080:80
    volumes:
      # Re-use local composer cache via host-volume
      - ~/.composer-docker/cache:/root/.composer/cache:delegated
      # Mount source-code for development
      - ./:/app

  superadmin:
    build: superadmin
    ports:
      - 20080:80
    volumes:
      # Re-use local composer cache via host-volume
      - ~/.composer-docker/cache:/root/.composer/cache:delegated
      # Mount source-code for development
      - ./:/app

  mysql:
    image: mysql:latest
    # Use 3307 on the host so Sequel Ace / CLI on your Mac don't hit a local mysqld
    # that may already be bound to 127.0.0.1:3306 (e.g. Homebrew MySQL).
    ports:
      - "3307:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=verysecret
      - MYSQL_DATABASE=ecom_platform_db
      - MYSQL_USER=ecom_platform
      - MYSQL_PASSWORD=secret

